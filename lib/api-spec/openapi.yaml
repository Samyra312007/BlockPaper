openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Crypto Trading Dashboard API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: Auth
    description: Browser and mobile authentication endpoints.
  - name: prices
    description: Market price data
  - name: portfolio
    description: User portfolio and account
  - name: orders
    description: Trade order management
  - name: ai
    description: AI trading assistant
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/user:
    get:
      tags: [Auth]
      operationId: getCurrentAuthUser
      summary: Get the currently authenticated user
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '200':
          description: Auth status resolved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserEnvelope'

  /login:
    get:
      tags: [Auth]
      operationId: beginBrowserLogin
      summary: Start the browser OIDC login flow
      parameters:
        - name: returnTo
          in: query
          required: false
          schema:
            type: string
      responses:
        '302':
          description: Redirect to the OIDC authorization endpoint.

  /callback:
    get:
      tags: [Auth]
      operationId: handleBrowserLoginCallback
      summary: Complete the browser OIDC login flow
      parameters:
        - name: code
          in: query
          required: false
          schema:
            type: string
        - name: state
          in: query
          required: false
          schema:
            type: string
        - name: iss
          in: query
          required: false
          schema:
            type: string
            format: uri
      responses:
        '302':
          description: Redirect to the returnTo path on success or /api/login on failure.

  /logout:
    get:
      tags: [Auth]
      operationId: logoutBrowserSession
      summary: Clear the session and begin OIDC logout
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '302':
          description: Redirect to the OIDC provider logout URL.

  /mobile-auth/token-exchange:
    post:
      tags: [Auth]
      operationId: exchangeMobileAuthorizationCode
      summary: Exchange a mobile OIDC code for a session token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MobileTokenExchangeRequest'
      responses:
        '200':
          description: Session created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MobileTokenExchangeSuccess'
        '400':
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Token did not contain usable claims.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Token exchange failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /mobile-auth/logout:
    post:
      tags: [Auth]
      operationId: logoutMobileSession
      summary: Delete a mobile session token
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
      responses:
        '200':
          description: Logout processed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutSuccess'

  /prices:
    get:
      operationId: getPrices
      tags: [prices]
      summary: Get current prices for all tracked assets
      responses:
        "200":
          description: Current price data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AssetPrice"

  /prices/{symbol}/candles:
    get:
      operationId: getCandleData
      tags: [prices]
      summary: Get candlestick OHLCV data for a symbol
      parameters:
        - name: symbol
          in: path
          required: true
          schema:
            type: string
        - name: interval
          in: query
          required: false
          schema:
            type: string
            enum: [1m, 5m, 15m, 1h, 4h, 1d]
            default: 1h
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 100
      responses:
        "200":
          description: Candlestick data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Candle"

  /account:
    get:
      operationId: getAccount
      tags: [portfolio]
      summary: Get the authenticated user's account info and balance
      responses:
        "200":
          description: Account data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"

  /portfolio:
    get:
      operationId: getPortfolio
      tags: [portfolio]
      summary: Get the authenticated user's portfolio holdings
      responses:
        "200":
          description: Portfolio holdings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Portfolio"

  /portfolio/summary:
    get:
      operationId: getPortfolioSummary
      tags: [portfolio]
      summary: Get portfolio summary with total value, P&L and allocation
      responses:
        "200":
          description: Portfolio summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PortfolioSummary"

  /orders:
    get:
      operationId: getOrders
      tags: [orders]
      summary: Get the authenticated user's order history
      parameters:
        - name: symbol
          in: query
          required: false
          schema:
            type: string
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [pending, filled, cancelled, all]
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: Order list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"
    post:
      operationId: placeOrder
      tags: [orders]
      summary: Place a market or limit order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlaceOrderBody"
      responses:
        "201":
          description: Order placed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "400":
          description: Invalid order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /orders/{id}:
    delete:
      operationId: cancelOrder
      tags: [orders]
      summary: Cancel a pending limit order
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Order cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "400":
          description: Order cannot be cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Order not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /openai/signals:
    get:
      operationId: getAiSignals
      tags: [ai]
      summary: Get AI-generated trading signals for all assets
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '200':
          description: Trading signals generated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SignalsResponse'

  /openai/market-summary:
    get:
      operationId: getMarketSummary
      tags: [ai]
      summary: Get AI-generated daily market summary
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '200':
          description: Market summary generated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MarketSummary'

  /openai/chat:
    post:
      operationId: sendAiChatMessage
      tags: [ai]
      summary: Send a message to the AI trading assistant (SSE stream)
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AiChatRequest'
      responses:
        '200':
          description: Streaming SSE response
          content:
            text/event-stream:
              schema:
                type: string

components:
  parameters:
    AuthorizationSessionHeader:
      name: Authorization
      in: header
      required: false
      description: Opaque session token — Bearer <sid>.
      schema:
        type: string
    SessionCookie:
      name: sid
      in: cookie
      required: false
      description: Browser session cookie.
      schema:
        type: string

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    AuthUser:
      type: object
      required: [id, email, firstName, lastName, profileImageUrl]
      properties:
        id:
          type: string
        email:
          type: [string, 'null']
          format: email
        firstName:
          type: [string, 'null']
        lastName:
          type: [string, 'null']
        profileImageUrl:
          type: [string, 'null']

    AuthUserEnvelope:
      type: object
      required: [user]
      properties:
        user:
          oneOf:
            - $ref: '#/components/schemas/AuthUser'
            - type: 'null'

    MobileTokenExchangeRequest:
      type: object
      required: [code, code_verifier, redirect_uri, state]
      properties:
        code:
          type: string
          minLength: 1
        code_verifier:
          type: string
          minLength: 1
        redirect_uri:
          type: string
          minLength: 1
          format: uri
        state:
          type: string
          minLength: 1
        nonce:
          type: string
          minLength: 1

    MobileTokenExchangeSuccess:
      type: object
      required: [token]
      properties:
        token:
          type: string

    LogoutSuccess:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
          const: true

    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: string

    AssetPrice:
      type: object
      required: [symbol, name, price, change24h, changePercent24h, volume24h, marketCap, high24h, low24h, updatedAt]
      properties:
        symbol:
          type: string
        name:
          type: string
        price:
          type: number
        change24h:
          type: number
        changePercent24h:
          type: number
        volume24h:
          type: number
        marketCap:
          type: number
        high24h:
          type: number
        low24h:
          type: number
        updatedAt:
          type: string
          format: date-time

    Candle:
      type: object
      required: [time, open, high, low, close, volume]
      properties:
        time:
          type: integer
          description: Unix timestamp in seconds
        open:
          type: number
        high:
          type: number
        low:
          type: number
        close:
          type: number
        volume:
          type: number

    Account:
      type: object
      required: [userId, cashBalance, totalDeposited, createdAt]
      properties:
        userId:
          type: string
        cashBalance:
          type: number
        totalDeposited:
          type: number
        createdAt:
          type: string
          format: date-time

    Holding:
      type: object
      required: [symbol, name, quantity, averageCost, currentPrice, currentValue, totalCost, unrealizedPnl, unrealizedPnlPercent]
      properties:
        symbol:
          type: string
        name:
          type: string
        quantity:
          type: number
        averageCost:
          type: number
        currentPrice:
          type: number
        currentValue:
          type: number
        totalCost:
          type: number
        unrealizedPnl:
          type: number
        unrealizedPnlPercent:
          type: number

    Portfolio:
      type: object
      required: [holdings]
      properties:
        holdings:
          type: array
          items:
            $ref: "#/components/schemas/Holding"

    PortfolioSummary:
      type: object
      required: [cashBalance, totalPortfolioValue, totalInvested, totalUnrealizedPnl, totalUnrealizedPnlPercent, allTimePnl, allTimePnlPercent, dayPnl, dayPnlPercent, allocation]
      properties:
        cashBalance:
          type: number
        totalPortfolioValue:
          type: number
        totalInvested:
          type: number
        totalUnrealizedPnl:
          type: number
        totalUnrealizedPnlPercent:
          type: number
        allTimePnl:
          type: number
        allTimePnlPercent:
          type: number
        dayPnl:
          type: number
        dayPnlPercent:
          type: number
        allocation:
          type: array
          items:
            $ref: "#/components/schemas/AllocationItem"

    AllocationItem:
      type: object
      required: [symbol, name, percentage, value]
      properties:
        symbol:
          type: string
        name:
          type: string
        percentage:
          type: number
        value:
          type: number

    Order:
      type: object
      required: [id, userId, symbol, side, type, quantity, price, status, filledAt, createdAt]
      properties:
        id:
          type: integer
        userId:
          type: string
        symbol:
          type: string
        side:
          type: string
          enum: [buy, sell]
        type:
          type: string
          enum: [market, limit]
        quantity:
          type: number
        price:
          type: number
        limitPrice:
          type: ["number", "null"]
        status:
          type: string
          enum: [pending, filled, cancelled]
        filledAt:
          type: ["string", "null"]
          format: date-time
        createdAt:
          type: string
          format: date-time

    PlaceOrderBody:
      type: object
      required: [symbol, side, type, quantity]
      properties:
        symbol:
          type: string
        side:
          type: string
          enum: [buy, sell]
        type:
          type: string
          enum: [market, limit]
        quantity:
          type: number
          minimum: 0
        limitPrice:
          type: ["number", "null"]

    TechnicalIndicators:
      type: object
      required: [rsi, macd, signal, histogram, sma20, sma50, ema12, ema26]
      properties:
        rsi:
          type: number
          description: RSI (14-period)
        macd:
          type: number
        signal:
          type: number
        histogram:
          type: number
        sma20:
          type: number
        sma50:
          type: number
        ema12:
          type: number
        ema26:
          type: number

    TradeSignal:
      type: object
      required: [symbol, signal, confidence, reasoning, technicals, suggestedQuantity, suggestedPrice]
      properties:
        symbol:
          type: string
        signal:
          type: string
          enum: [BUY, SELL, HOLD]
        confidence:
          type: number
          description: Confidence percentage 0-100
        reasoning:
          type: string
        technicals:
          $ref: '#/components/schemas/TechnicalIndicators'
        suggestedQuantity:
          type: number
        suggestedPrice:
          type: number

    SignalsResponse:
      type: object
      required: [signals, generatedAt]
      properties:
        signals:
          type: array
          items:
            $ref: '#/components/schemas/TradeSignal'
        generatedAt:
          type: string
          format: date-time

    MarketSummary:
      type: object
      required: [summary, sentiment, keyPoints, generatedAt]
      properties:
        summary:
          type: string
        sentiment:
          type: string
          enum: [bullish, bearish, neutral]
        keyPoints:
          type: array
          items:
            type: string
        generatedAt:
          type: string
          format: date-time

    AiChatMessage:
      type: object
      required: [role, content]
      properties:
        role:
          type: string
          enum: [user, assistant]
        content:
          type: string

    AiChatRequest:
      type: object
      required: [messages]
      properties:
        messages:
          type: array
          items:
            $ref: '#/components/schemas/AiChatMessage'
